<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="auxiliar">
<!-- Responsable: Jorge Nunez / G6 Verificacion REIAC -->
<main class="container py-4">
    <h1>Verificacion REIAC</h1>
    <nav class="app-nav">
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/dashboard.html">Dashboard</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/mascotas.html">Mascotas</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Salir</a>
    </nav>
    <section class="panel-card mb-4">
        <form id="reiacForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="chip">Codigo de microchip</label>
                <input class="form-control" id="chip" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Verificar</button>
            </div>
        </form>
        <div id="reiacStatus" class="status-message mt-3"></div>
    </section>
    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>Chip</th><th>Resultado</th><th>Fecha</th></tr></thead>
            <tbody id="reiacBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/auxiliar/reiac.js"></script>
</body>
</html>
