<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="cliente">
<!-- Responsable: David Iglesias Borland / G7 Citas cliente -->
<main class="container py-4">
    <h1>Mis citas</h1>
    <p class="small-muted">Solicita una visita en un hueco disponible. El auxiliar revisara y confirmara la cita.</p>
    <section class="panel-card mb-4">
        <form id="citaClienteForm" class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="mascotaIdCliente">Mascota</label>
                <select class="form-select" id="mascotaIdCliente" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="veterinarioIdCliente">Veterinario</label>
                <select class="form-select" id="veterinarioIdCliente" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="slotCliente">Citas disponibles</label>
                <select class="form-select" id="slotCliente" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="motivoCliente">Motivo</label>
                <input class="form-control" id="motivoCliente" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" id="btnSolicitarCita" type="submit">Solicitar cita</button>
            </div>
        </form>
        <div id="citasClienteStatus" class="status-message mt-3"></div>
    </section>
    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>Fecha</th><th>Mascota</th><th>Veterinario</th><th>Motivo</th><th>Estado</th></tr></thead>
            <tbody id="citasClienteBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/cliente/citas.js"></script>
</body>
</html>
