<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="cliente">
<!-- Responsable: David Iglesias Borland / G7 Pagos cliente -->
<main class="container py-4">
    <h1>Pagos</h1>
    <p class="small-muted">Revisa pagos pendientes y confirma el abono desde tu portal privado.</p>
    <section class="panel-card mb-4">
        <form id="pagoForm" class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="pagoId">Pago pendiente</label>
                <select class="form-select" id="pagoId" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="metodoPago">Metodo</label>
                <select class="form-select" id="metodoPago">
                    <option value="TARJETA">Tarjeta</option>
                    <option value="BIZUM">Bizum</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                </select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Confirmar pago</button>
            </div>
        </form>
        <div id="pagosStatus" class="status-message mt-3"></div>
    </section>

    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Concepto</th><th>Importe</th><th>Metodo</th><th>Estado</th><th>Fecha</th><th class="text-end">Accion</th></tr></thead>
            <tbody id="pagosBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/cliente/pagos.js"></script>
</body>
</html>
