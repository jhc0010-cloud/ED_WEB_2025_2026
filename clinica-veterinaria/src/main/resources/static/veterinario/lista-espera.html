<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de espera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="veterinario">
<!-- Responsable: Francisco Fernandez / G5 Lista de espera veterinario -->
<main class="container py-4">
    <h1>Lista de espera</h1>
    <p class="small-muted">Citas confirmadas asignadas al veterinario conectado.</p>
    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>Hora</th><th>Mascota</th><th>Cliente</th><th>Motivo</th><th>Estado</th><th class="text-end">Accion</th></tr></thead>
            <tbody id="listaEsperaBody"></tbody>
        </table>
    </section>
    <div id="listaStatus" class="status-message mt-3"></div>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/veterinario/lista-espera.js"></script>
</body>
</html>
