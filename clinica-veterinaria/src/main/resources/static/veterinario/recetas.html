<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="veterinario">
<!-- Responsable: Francisco Fernandez / G5 Recetas -->
<main class="container py-4">
    <h1>Recetas</h1>
    <p class="small-muted">Emision de recetas vinculadas a consultas cerradas. Anade tantos medicamentos como necesite la mascota.</p>
    <section class="panel-card mb-4">
        <form id="recetaForm" class="row g-3">
            <div class="col-md-4">
                <label class="form-label" for="consultaId">Consulta</label>
                <select class="form-select" id="consultaId" required></select>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="medicamento">Medicamento</label>
                <input class="form-control" id="medicamento" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="dosis">Dosis</label>
                <input class="form-control" id="dosis">
            </div>
            <div class="col-12">
                <label class="form-label" for="indicaciones">Indicaciones</label>
                <textarea class="form-control" id="indicaciones" rows="3"></textarea>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-success w-100" id="btnAgregarMedicamento" type="button">Anadir medicamento</button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-success w-100" type="submit">Guardar receta</button>
            </div>
        </form>
        <div id="recetaStatus" class="status-message mt-3"></div>
        <div class="table-card mt-3">
            <table class="table table-hover mb-0">
                <thead><tr><th>Medicamento</th><th>Dosis</th><th>Indicaciones</th><th class="text-end">Accion</th></tr></thead>
                <tbody id="medicamentosPendientesBody"></tbody>
            </table>
        </div>
    </section>
    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Consulta</th><th>Medicamento</th><th>Dosis</th><th>Indicaciones</th></tr></thead>
            <tbody id="recetasBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/veterinario/receta.js"></script>
</body>
</html>
