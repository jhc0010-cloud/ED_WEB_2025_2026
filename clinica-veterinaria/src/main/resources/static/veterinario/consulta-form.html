<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="veterinario">
<!-- Responsable: Francisco Fernandez / G5 Registro de consulta -->
<main class="container py-4">
    <h1>Registrar consulta</h1>
    <p class="small-muted">Selecciona una cita de tu lista de espera y cierra la atencion clinica.</p>
    <section class="panel-card">
        <form id="consultaForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="citaId">Cita confirmada</label>
                <select class="form-select" id="citaId" required></select>
            </div>
            <div class="col-12">
                <label class="form-label" for="sintomas">Sintomas</label>
                <textarea class="form-control" id="sintomas" rows="3" required></textarea>
            </div>
            <div class="col-12">
                <label class="form-label" for="diagnostico">Diagnostico</label>
                <textarea class="form-control" id="diagnostico" rows="3" required></textarea>
            </div>
            <div class="col-12">
                <label class="form-label" for="tratamiento">Tratamiento</label>
                <textarea class="form-control" id="tratamiento" rows="3"></textarea>
            </div>
            <div class="col-md-3">
                <button class="btn btn-success w-100" type="submit">Guardar consulta</button>
            </div>
        </form>
        <div id="consultaStatus" class="status-message mt-3"></div>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/veterinario/consulta.js"></script>
</body>
</html>
