<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
<!-- Responsable: David Martin Marti - G3 Registro cliente -->
<main class="auth-wrap">
    <section class="auth-intro">
        <span class="badge text-bg-light align-self-start mb-3">Portal cliente</span>
        <h1>Alta rapida para consultar citas, historial y pagos</h1>
        <p>El registro crea una cuenta de cliente para entrar al portal privado y seguir la actividad de la mascota.</p>
    </section>
    <section class="form-card auth-card">
        <span class="badge text-bg-success mb-3">Alta cliente</span>
        <h2 class="h3 mb-2">Crear cuenta</h2>
        <p class="small-muted mb-4">El registro crea tu usuario y tu ficha de cliente.</p>
        <form id="registerForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="nombre">Nombre</label>
                    <input class="form-control" id="nombre" type="text" autocomplete="given-name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="apellidos">Apellidos</label>
                    <input class="form-control" id="apellidos" type="text" autocomplete="family-name" required>
                </div>
                <div class="col-12">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" autocomplete="email" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="dni">DNI</label>
                    <input class="form-control" id="dni" type="text" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="telefono">Telefono</label>
                    <input class="form-control" id="telefono" type="tel" autocomplete="tel" required>
                </div>
                <div class="col-12">
                    <label class="form-label" for="direccion">Direccion</label>
                    <input class="form-control" id="direccion" type="text" autocomplete="street-address">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="usuario">Usuario</label>
                    <input class="form-control" id="usuario" type="text" autocomplete="username" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="clave">Contrasena</label>
                    <input class="form-control" id="clave" type="password" autocomplete="new-password" required>
                </div>
            </div>
            <button class="btn btn-success w-100 mt-4" type="submit">Crear cuenta</button>
        </form>
        <div id="mensajeRegistro" class="status-message mt-3"></div>
        <p class="text-center mt-3 mb-0"><a href="/login.html">Ya tengo cuenta</a></p>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/auth.js"></script>
</body>
</html>
