<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<main class="container py-5">
    <section class="form-card mx-auto">
        <h1 class="h3 mb-4 text-center">Registro de cliente</h1>
        <form id="registerForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="nombre">Nombre</label>
                    <input class="form-control" id="nombre" type="text" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="apellidos">Apellidos</label>
                    <input class="form-control" id="apellidos" type="text" required>
                </div>
                <div class="col-12">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="usuario">Usuario</label>
                    <input class="form-control" id="usuario" type="text" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="clave">Contraseña</label>
                    <input class="form-control" id="clave" type="password" required>
                </div>
            </div>
            <button class="btn btn-success w-100 mt-4" type="submit">Registrarse</button>
        </form>
    </section>
</main>
<script src="/js/common/api.js"></script>
</body>
</html>
