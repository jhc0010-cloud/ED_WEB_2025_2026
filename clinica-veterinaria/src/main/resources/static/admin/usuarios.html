<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="admin">
<!-- Responsable: Jesus Enrique de la Torre Jimenez / G3 Login y control de usuarios -->
<main class="container py-4">
    <h1>Usuarios</h1>
    <p class="small-muted">Alta y listado de usuarios con rol.</p>
    <nav class="app-nav">
        <a class="btn btn-outline-success btn-sm" href="/admin/dashboard.html">Dashboard</a>
        <a class="btn btn-outline-success btn-sm" href="/admin/perfiles.html">Perfiles</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Salir</a>
    </nav>

    <section class="panel-card mb-4">
        <form id="usuarioForm" class="row g-3">
            <input type="hidden" id="usuarioId">
            <div class="col-md-3">
                <label class="form-label" for="nombre">Nombre</label>
                <input class="form-control" id="nombre" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="apellidos">Apellidos</label>
                <input class="form-control" id="apellidos" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="username">Usuario</label>
                <input class="form-control" id="username" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="password">Contrasena</label>
                <input class="form-control" id="password" type="password" placeholder="Solo nueva o cambio">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="rolId">Rol</label>
                <select class="form-select" id="rolId" required></select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Guardar usuario</button>
            </div>
        </form>
        <div id="usuariosStatus" class="status-message mt-3"></div>
    </section>

    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Usuario</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody id="usuariosBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/admin/usuarios.js"></script>
</body>
</html>
