<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos y documentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="auxiliar">
<!-- Responsable: Gonzalo Viedma / G4 Pagos y documentacion auxiliar -->
<main class="container py-4">
    <h1>Pagos y documentos</h1>
    <p class="small-muted">Confirma pagos en recepcion e imprime recibos, recetas y justificantes de cita.</p>

    <section class="panel-card mb-4">
        <h2 class="h5 mb-3">Pagos</h2>
        <div class="row g-3 mb-3">
            <div class="col-md-3">
                <label class="form-label" for="metodoPagoAux">Metodo al confirmar</label>
                <select class="form-select" id="metodoPagoAux">
                    <option value="TARJETA">Tarjeta</option>
                    <option value="BIZUM">Bizum</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                    <option value="EFECTIVO">Efectivo</option>
                </select>
            </div>
        </div>
        <div class="table-card">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>Cliente</th><th>Concepto</th><th>Importe</th><th>Metodo</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
                <tbody id="pagosAuxBody"></tbody>
            </table>
        </div>
        <div id="pagosAuxStatus" class="status-message mt-3"></div>
    </section>

    <section class="panel-card">
        <h2 class="h5 mb-3">Recetas emitidas</h2>
        <div class="table-card">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>Mascota</th><th>Cliente</th><th>Medicamento</th><th>Dosis</th><th class="text-end">Acciones</th></tr></thead>
                <tbody id="recetasAuxBody"></tbody>
            </table>
        </div>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/auxiliar/pagos.js"></script>
</body>
</html>
