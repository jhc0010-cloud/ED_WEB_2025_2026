<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="auxiliar">
<!-- Responsable: Gonzalo Viedma / G4 Gestion de clientes -->
<main class="container py-4">
    <h1>Clientes</h1>
    <p class="small-muted">Alta, busqueda, edicion y baja de propietarios.</p>
    <nav class="app-nav">
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/dashboard.html">Dashboard</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/mascotas.html">Mascotas</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/citas.html">Citas</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Salir</a>
    </nav>

    <section class="panel-card mb-4">
        <form id="clienteForm" class="row g-3">
            <input type="hidden" id="clienteId">
            <div class="col-md-3">
                <label class="form-label" for="nombre">Nombre</label>
                <input class="form-control" id="nombre" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="apellidos">Apellidos</label>
                <input class="form-control" id="apellidos" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="dni">DNI</label>
                <input class="form-control" id="dni" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="telefono">Telefono</label>
                <input class="form-control" id="telefono" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email">
            </div>
            <div class="col-md-8">
                <label class="form-label" for="direccion">Direccion</label>
                <input class="form-control" id="direccion">
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Guardar cliente</button>
            </div>
        </form>
        <div id="clientesStatus" class="status-message mt-3"></div>
    </section>

    <section class="toolbar mb-3">
        <div>
            <label class="form-label" for="buscarCliente">Buscar</label>
            <input class="form-control" id="buscarCliente" placeholder="Nombre, apellidos o DNI">
        </div>
        <button class="btn btn-outline-success" id="btnBuscar" type="button">Buscar</button>
        <button class="btn btn-outline-secondary" id="btnLimpiar" type="button">Limpiar</button>
    </section>

    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>DNI</th>
                <th>Telefono</th>
                <th>Email</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody id="clientesBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/auxiliar/clientes.js"></script>
</body>
</html>
