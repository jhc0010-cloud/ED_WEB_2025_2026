<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mascotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="auxiliar">
<!-- Responsable: Jorge Nunez / G6 Gestion de mascotas -->
<main class="container py-4">
    <h1>Mascotas</h1>
    <p class="small-muted">Alta, busqueda, baja logica y asignacion de veterinario.</p>
    <nav class="app-nav">
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/dashboard.html">Dashboard</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/clientes.html">Clientes</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/citas.html">Citas</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Salir</a>
    </nav>

    <section class="panel-card mb-4">
        <form id="mascotaForm" class="row g-3">
            <input type="hidden" id="mascotaId">
            <div class="col-md-3">
                <label class="form-label" for="nombreMascota">Nombre</label>
                <input class="form-control" id="nombreMascota" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="especie">Especie</label>
                <input class="form-control" id="especie" required>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="raza">Raza</label>
                <input class="form-control" id="raza">
            </div>
            <div class="col-md-2">
                <label class="form-label" for="sexo">Sexo</label>
                <input class="form-control" id="sexo">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="chip">Chip</label>
                <input class="form-control" id="chip">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="fechaNacimiento">Fecha nacimiento</label>
                <input class="form-control" id="fechaNacimiento" type="date">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="clienteId">Cliente</label>
                <select class="form-select" id="clienteId" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="veterinarioId">Veterinario</label>
                <select class="form-select" id="veterinarioId"></select>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Guardar mascota</button>
            </div>
        </form>
        <div id="mascotasStatus" class="status-message mt-3"></div>
    </section>

    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Mascota</th>
                <th>Cliente</th>
                <th>Veterinario</th>
                <th>REIAC</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody id="mascotasBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/auxiliar/mascotas.js"></script>
</body>
</html>
