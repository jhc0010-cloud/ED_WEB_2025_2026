<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-role="auxiliar">
<!-- Responsable: Gonzalo Viedma / G4 Auxiliar, coordinado con Jorge Nunez / G6 Mascotas -->
<main class="container py-4">
    <h1>Citas</h1>
    <p class="small-muted">Gestiona la agenda y confirma las solicitudes pendientes de los clientes.</p>
    <nav class="app-nav">
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/dashboard.html">Dashboard</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/clientes.html">Clientes</a>
        <a class="btn btn-outline-success btn-sm" href="/auxiliar/mascotas.html">Mascotas</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Salir</a>
    </nav>

    <section class="panel-card mb-4">
        <form id="citaForm" class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="mascotaId">Mascota</label>
                <select class="form-select" id="mascotaId" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="veterinarioId">Veterinario</label>
                <select class="form-select" id="veterinarioId" required></select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="fechaHora">Fecha y hora</label>
                <input class="form-control" id="fechaHora" type="datetime-local" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="motivo">Motivo</label>
                <input class="form-control" id="motivo" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100" type="submit">Crear cita</button>
            </div>
        </form>
        <div id="citasStatus" class="status-message mt-3"></div>
    </section>

    <section class="table-card">
        <table class="table table-hover mb-0">
            <thead><tr><th>Fecha</th><th>Mascota</th><th>Veterinario</th><th>Motivo</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
            <tbody id="citasBody"></tbody>
        </table>
    </section>
</main>
<script src="/js/common/api.js"></script>
<script src="/js/common/layout.js"></script>
<script src="/js/auxiliar/citas.js"></script>
</body>
</html>
